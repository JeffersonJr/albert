  <!-- Cache Busting Meta Tags -->

  <!-- Performance Optimizations -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://www.googletagmanager.com">

  <!-- Asset Loading Failure Recovery -->
  <script>
    // Global handler for asset loading failures
    window.addEventListener('error', function (e) {
      // Only handle script and link tags that failed to load
      if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
        const url = e.target.src || e.target.href;
        // Only handle internal assets
        if (url && url.includes(window.location.origin) && !url.includes('gtm.js')) {
          console.error('Critical asset failed to load:', url);

          // If we've already tried to reload in the last 10 seconds, don't loop
          const lastReload = sessionStorage.getItem('last_asset_reload');
          const now = Date.now();

          if (!lastReload || (now - parseInt(lastReload)) > 10000) {
            sessionStorage.setItem('last_asset_reload', now.toString());
            console.warn('Attempting hard reload to recover from asset 404...');

            // Clear critical caches and reload
            if ('caches' in window) {
              caches.keys().then(names => {
                for (let name of names) caches.delete(name);
                window.location.reload(true);
              });
            } else {
              window.location.reload(true);
            }
          }
        }
      }
    }, true);
  </script>

  <!-- Critical CSS (inline) -->
  <style>
    /* Critical CSS for above-the-fold content */
    .loading-skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }

    @keyframes loading {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    /* Hero is visible by default for better LCP */
    .hero-section {
      opacity: 1;
    }

    .hero-loaded {
      opacity: 1;
      transition: opacity 0.3s ease-in;
    }

    /* Prevent layout shift */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Image placeholders to prevent CLS */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .placeholder-image {
      background-color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    /* Font loading optimization */
    @font-face {
      font-family: 'Inter';
      font-display: swap;
      src: local('Inter');
    }

    /* Skeleton loading */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 8px;
    }

    /* Prevent flash of unstyled content */
    .no-js {
      visibility: hidden;
    }

    .js-loaded {
      visibility: visible;
    }

    /* Layout Skeleton for 0 CLS */
    .skeleton-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 72px;
      width: 100%;
      background: white;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      z-index: 1000;
    }

    @media (min-width: 1024px) {
      .skeleton-nav {
        height: 80px;
      }
    }

    .skeleton-hero {
      padding-top: 96px;
      /* Match mobile pt-24 (6rem) */
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 100vh;
      background: linear-gradient(to bottom right, #F8FAFA, #ffffff);
    }

    @media (min-width: 1024px) {
      .skeleton-hero {
        padding-top: 128px;
        /* Match lg:pt-32 (8rem) */
        align-items: flex-start;
        padding-left: 10%;
        text-align: left;
      }
    }

    .skeleton-badge {
      width: 140px;
      height: 36px;
      background: rgba(45, 135, 131, 0.1);
      border-radius: 9999px;
      margin-bottom: 2rem;
    }

    .skeleton-title {
      width: 80%;
      max-width: 600px;
      height: 120px;
      background: rgba(45, 135, 131, 0.05);
      border-radius: 8px;
      margin-bottom: 2rem;
    }

    .skeleton-text {
      width: 90%;
      max-width: 500px;
      height: 60px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 4px;
    }
  </style>

  <!-- Google Tag Manager -->
  <script>
    // Load GTM with delay to prioritize first paint
    window.addEventListener('load', function () {
      setTimeout(function () {
        (function (w, d, s, l, i) {
          w[l] = w[l] || [];
          w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
          var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : '';
          j.async = true;
          j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
          f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-TXKZ5T8K');
      }, 3000);
    });
  </script>


  <!-- Preload LCP critical assets -->
  <link rel="preload" href="/img/logo-green.png" as="image" type="image/png" fetchpriority="high">

  <!-- Scripts - Optimized Loading -->
  <script src="/console-cleaner-prod.js" defer></script>

  <script>
    // Only load DOM handler in production
    if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
      const script = document.createElement('script');
      script.src = '/dom-error-handler.js';
      document.head.appendChild(script);
    }
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        // Unregister existing SW transitionally on localhost to clean up environment
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Unregistered SW on localhost for dev compatibility');
          }
        });
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered with scope:', registration.scope);
            })
            .catch(error => {
              console.log('SW registration failed:', error);
            });
        });
      }
    }
  </script>
